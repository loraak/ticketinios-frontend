<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<p-card>
    <ng-template pTemplate="header">
        <div class="flex justify-content-between align-items-center px-4 pt-3">
            <h2 style="margin: 0; font-size: 1.25rem; font-weight: 700; color: var(--text-color);">
                Grupos
            </h2>
            <p-button *ifHasPermission="['grupos:crear']" label="Nuevo Grupo" icon="pi pi-plus" (onClick)="abrirModalNuevo()"></p-button>
        </div>
    </ng-template>

    <p-table [value]="grupos" [paginator]="true" [rows]="5" dataKey="id">
        <ng-template pTemplate="header">
            <tr>
                <th>Nombre del grupo</th>
                <th>Creador</th>
                <th>Descripción</th>
                <th>Número de integrantes</th>
                <th>Estado</th>
                <th style="width: 12rem;">Acciones</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-grupo let-expanded="expanded">
            <tr>
                <td>{{ grupo.nombre }}</td>
                <td>{{ grupo.creador }}</td>
                <td>{{ grupo.descripcion }}</td>
                <td>{{ grupo.integrantes }}</td>
                <td>
                    <p-tag [value]="grupo.activo ? 'Activo' : 'Baja'" [severity]="grupo.activo ? 'success' : 'danger'"></p-tag>
                </td>
                <td>
                    <div class="flex gap-2">
                        <p-button *ifHasPermission="['grupos:ver_especifico']" icon="pi pi-eye" [rounded]="true" [text]="true" severity="info" pTooltip="Ingresar al grupo" (onClick)="ingresarGrupo(grupo.id)"></p-button>
                        <p-button 
                            *ifHasPermission="{ permisos: ['grupos:editar'], grupoId: grupo.id }"
                            icon="pi pi-pencil"
                            [rounded]="true"
                            [text]="true"
                            pTooltip="Editar grupo"
                            (onClick)="abrirModalEditar(grupo)"
                            [disabled]="!grupo.activo">
                        </p-button>
                        <p-button *ifHasPermission="['grupos:eliminar']" icon="pi pi-ban" [rounded]="true" [text]="true" severity="danger" pTooltip="Dar de baja" (onClick)="confirmarBaja(grupo)" [disabled]="!grupo.activo"></p-button>
                    </div>
                </td>
            </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="8" class="text-center p-4 text-color-secondary">No hay grupos registrados.</td>
            </tr>
        </ng-template>
    </p-table>
</p-card>

<p-dialog
    [(visible)]="modalVisible"
    [header]="modoEdicion ? 'Editar Grupo' : 'Nuevo Grupo'"
    [modal]="true"
    [style]="{ width: '480px' }"
    [draggable]="false">

    <form [formGroup]="form">
        <div style="display: flex; flex-direction: column; gap: 1.5rem; padding: 1.5rem 0 0.5rem;">
            <p-floatlabel class="w-full mt-2">
                <input id="nombre" type="text" pInputText formControlName="nombre" class="w-full">
                <label for="nombre">Nombre</label>
            </p-floatlabel>
            <p-floatlabel class="w-full mt-2">
                <input id="creador" type="text" pInputText formControlName="creador" class="w-full">
                <label for="creador">Creador</label>
            </p-floatlabel>
            <p-floatlabel class="w-full mt-2">
                <textarea id="descripcion" pTextarea formControlName="descripcion"
                    class="w-full" rows="3" style="resize: none;">
                </textarea>
                <label for="descripcion">Descripción</label>
            </p-floatlabel>
        </div>
    </form>

    <ng-template pTemplate="footer">
        <p-button label="Cancelar" severity="secondary" [text]="true"
            (onClick)="modalVisible = false">
        </p-button>
        <p-button [label]="modoEdicion ? 'Guardar' : 'Crear'"
            (onClick)="guardar()">
        </p-button>
    </ng-template>
</p-dialog>
