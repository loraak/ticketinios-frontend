<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<p-card>
    <ng-template pTemplate="header">
        <div class="flex justify-content-between align-items-center px-4 pt-3">
            <h2 style="margin: 0; font-size: 1.25rem; font-weight: 700; color: var(--text-color);">
                Gestión de Grupos
            </h2>
            <p-button *ifHasPermission="['grupos:crear']" label="Nuevo Grupo" icon="pi pi-plus" (onClick)="abrirModalNuevo()"></p-button>
        </div>
    </ng-template>

    <p-table [value]="grupos" [paginator]="true" [rows]="10" dataKey="id" [loading]="loading">
        <ng-template pTemplate="header">
            <tr>
                <th pSortableColumn="nombre">Nombre <p-sortIcon field="nombre"></p-sortIcon></th>
                <th pSortableColumn="creador">Creador <p-sortIcon field="creador"></p-sortIcon></th>
                <th>Integrantes</th>
                <th>Estado</th>
                <th style="width: 10rem;" class="text-center">Acciones</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-grupo>
            <tr>
                <td class="font-medium text-color">{{ grupo.nombre }}</td>
                <td>{{ grupo.creador }}</td>
                <td>{{ grupo.integrantes }}</td>
                <td>
                    <p-tag 
                        [value]="grupo.activo ? 'Activo' : 'Baja'" 
                        [severity]="grupo.activo ? 'success' : 'danger'">
                    </p-tag>
                </td>
                <td class="text-center">
                    <div class="flex gap-1 justify-content-center">
                        <p-button 
                            icon="pi pi-users" 
                            [rounded]="true" 
                            [text]="true" 
                            severity="info"
                            *ifHasPermission="['gestionarGrupos:agregar_usuario']"
                            pTooltip="Gestionar miembros"
                            (onClick)="abrirModalMiembros(grupo)">
                        </p-button>
                        <p-button 
                            *ifHasPermission="['gestionarGrupos:editar_grupo']"
                            icon="pi pi-pencil"
                            [rounded]="true"
                            [text]="true"
                            pTooltip="Editar grupo"
                            (onClick)="abrirModalEditar(grupo)"
                            [disabled]="!grupo.activo">
                        </p-button>
                        <p-button 
                            [icon]="grupo.activo ? 'pi pi-ban' : 'pi pi-check-circle'"
                            [rounded]="true" 
                            [text]="true" 
                            [severity]="grupo.activo ? 'danger' : 'success'"
                            *ifHasPermission="['gestionarGrupos:eliminar']"
                            [pTooltip]="grupo.activo ? 'Dar de baja' : 'Dar de alta'"
                            (onClick)="confirmarEliminarGrupo(grupo)">
                        </p-button>
                    </div>
                </td>
            </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="5" class="text-center p-4 text-color-secondary">No hay grupos registrados.</td>
            </tr>
        </ng-template>
    </p-table>
</p-card>

<!-- Modal gestionar miembros -->
<p-dialog
    [(visible)]="modalMiembrosVisible"
    [header]="'Miembros — ' + (grupoSeleccionado?.nombre || '')"
    [modal]="true"
    [style]="{ width: '600px' }"
    [draggable]="false">

    <div class="flex flex-column gap-4 pt-3">

        <!-- Selector de usuarios -->
        <div>
            <label class="block mb-2 text-sm font-medium text-color-secondary">Agregar usuarios al grupo</label>
            <p-multiSelect
                [options]="usuarios"
                [(ngModel)]="usuariosSeleccionados"
                optionLabel="nombreCompleto"
                optionValue="id"
                placeholder="Selecciona usuarios..."
                [filter]="true"
                filterPlaceholder="Buscar usuario..."
                [maxSelectedLabels]="2"
                selectedItemsLabel="{0} usuarios seleccionados"
                class="w-full"
                styleClass="w-full"
                appendTo="body">
            </p-multiSelect>
        </div>

        @if (miembrosActuales.length > 0) {
            <div>
                <label class="block mb-2 text-sm font-medium text-color-secondary">Miembros actuales</label>
                <p-table [value]="miembrosActuales" styleClass="p-datatable-sm">
                    <ng-template pTemplate="header">
                        <tr>
                            <th>Nombre</th>
                            <th class="text-center" style="width: 8rem;">Permisos</th>
                        </tr>
                    </ng-template>
                    <ng-template pTemplate="body" let-miembro>
                        <tr>
                            <td>{{ miembro.nombreCompleto }}</td>
                            <td class="text-center">
                                <p-button
                                    icon="pi pi-shield"
                                    [rounded]="true"
                                    [text]="true"
                                    severity="warn"
                                    *ifHasPermission="['gestionarGrupos:modificar_permisos']"
                                    pTooltip="Configurar permisos"
                                    (onClick)="abrirModalPermisos(grupoSeleccionado!, miembro)">
                                </p-button>
                            </td>
                        </tr>
                    </ng-template>
                </p-table>
            </div>
        }
    </div>

    <ng-template pTemplate="footer">
        <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="modalMiembrosVisible = false"></p-button>
        <p-button label="Guardar" (onClick)="guardarMiembros()"></p-button>
    </ng-template>
</p-dialog>

<!-- Modal configurar permisos -->
<p-dialog
    [(visible)]="modalPermisosVisible"
    [header]="'Permisos de ' + (miembroSeleccionado?.nombreCompleto || '') + ' en ' + (grupoSeleccionado?.nombre || '')"
    [modal]="true"
    [style]="{ width: '450px' }"
    [draggable]="false">

    <div class="flex flex-column gap-3 pt-3">
        @for (permiso of permisosDisponibles; track permiso) {
            <div class="flex align-items-center gap-2">
                <p-checkbox
                    [value]="permiso"
                    [(ngModel)]="permisosSeleccionados"
                    [inputId]="permiso">
                </p-checkbox>
                <label [for]="permiso" class="text-color cursor-pointer">{{ permiso }}</label>
            </div>
        }
    </div>

    <ng-template pTemplate="footer">
        <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="modalPermisosVisible = false"></p-button>
        <p-button label="Guardar permisos" (onClick)="guardarPermisos()"></p-button>
    </ng-template>
</p-dialog>

<p-dialog
    [(visible)]="modalVisible"
    [header]="modoEdicion ? 'Editar Grupo' : 'Nuevo Grupo'"
    [modal]="true"
    [style]="{ width: '480px' }"
    [draggable]="false">

    <form [formGroup]="form">
        <div style="display: flex; flex-direction: column; gap: 1.5rem; padding: 1.5rem 0 0.5rem;">
            <p-floatlabel class="w-full mt-2">
                <input id="nombre" type="text" pInputText formControlName="nombre" class="w-full">
                <label for="nombre">Nombre</label>
            </p-floatlabel>
            <p-floatlabel class="w-full mt-2">
                <textarea id="descripcion" pTextarea formControlName="descripcion"
                    class="w-full" rows="3" style="resize: none;">
                </textarea>
                <label for="descripcion">Descripción</label>
            </p-floatlabel>
        </div>
    </form>

    <ng-template pTemplate="footer">
        <p-button label="Cancelar" severity="secondary" [text]="true"
            (onClick)="modalVisible = false">
        </p-button>
        <p-button [label]="modoEdicion ? 'Guardar' : 'Crear'"
            (onClick)="guardar()">
        </p-button>
    </ng-template>
</p-dialog>
