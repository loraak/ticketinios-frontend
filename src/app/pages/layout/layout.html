<div class="flex" style="min-height: 100vh; background: #f8f9fa;">

    <!-- Sidebar -->
    <div style="width: 260px; background: #1e293b; color: white; display: flex; flex-direction: column; padding: 1.5rem 1rem;">

        <div class="text-center mb-4">
            <p-avatar icon="pi pi-user" size="xlarge" shape="circle"
                style="background: #38bdf8; color: white;">
            </p-avatar>
            <p style="margin: 0; font-size: 0.8rem; color: #94a3b8; margin-top: 10px;">
                {{ authService.usuario()?.email }}
            </p>
        </div>

        <hr style="border-color: #334155; margin-bottom: 1rem;">

        <nav style="display: flex; flex-direction: column; gap: 0.5rem;">
            <a routerLink="/app/home" routerLinkActive="active-nav"
                style="display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 8px; color: #94a3b8; text-decoration: none; cursor: pointer;">
                <i class="pi pi-home"></i> Inicio
            </a>
            <a routerLink="/app/perfil" routerLinkActive="active-nav"
                style="display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 8px; color: #94a3b8; text-decoration: none; cursor: pointer;">
                <i class="pi pi-user"></i> Perfil
            </a>
            @if (authService.tienePermiso(PERMISOS.USUARIOS_ADMIN)) {
                <a routerLink="/app/usuarios" routerLinkActive="active-nav"
                    style="display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 8px; color: #94a3b8; text-decoration: none; cursor: pointer;">
                    <i class="pi pi-users"></i> Usuarios
                </a>
            }
            <a routerLink="/app/crud" routerLinkActive="active-nav"
                style="display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 8px; color: #94a3b8; text-decoration: none; cursor: pointer;">
                <i class="pi pi-table"></i> CRUDo
            </a>
        </nav>

        <div style="margin-top: auto;">
            <p style="text-align: center; font-size: 0.75rem; color: #475569; margin: 0 0 0.5rem;">
                v1.0.0
            </p>
            <a (click)="logout()"
                style="display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 8px; color: #f87171; text-decoration: none; cursor: pointer;">
                <i class="pi pi-sign-out"></i> Cerrar Sesión
            </a>
        </div>
    </div>

    <div class="flex-1 p-4">
        <router-outlet></router-outlet>
    </div>

</div>
